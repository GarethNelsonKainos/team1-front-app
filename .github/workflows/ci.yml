# ─────────────────────────────────────────────────────────────
# Frontend CI  –  test → build → push to ACR
# ─────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   ACR_USERNAME        – Azure Container Registry username
#   ACR_PASSWORD        – Azure Container Registry password
# ─────────────────────────────────────────────────────────────

name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_REGISTRY: academyacrj3r5dv.azurecr.io
  IMAGE_PREFIX: ethan-campbell

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - run: npm ci
    - run: npm run build
    - run: npm run check
    - run: npm run test:coverage

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build & push frontend image
      run: |
        docker build --platform linux/amd64 \
          -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/team1-front-app:${{ github.sha }} \
          -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/team1-front-app:latest \
          .
        docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/team1-front-app --all-tags
