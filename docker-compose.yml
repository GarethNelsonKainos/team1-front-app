services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Points to the backend running on your host machine.
      # Start the backend separately (locally or via its own docker compose).
      API_BASE_URL: http://host.docker.internal:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
